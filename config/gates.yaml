gates:
  browser_verification:
    enabled: false
    pattern: browser verification missing
    action: require_browser_proof_for_ui_changes
    ui_file_hints:
      - ".tsx"
      - ".jsx"
      - "app/"
      - "components/"
      - "pages/"
      - "public/"
    verification_hints:
      - "browser"
      - "playwright"
      - "snapshot"
      - "qa"
